# ===================== 블루투스 파라미터 설정 =====================
# 최대 연결 간격 (1.25ms 단위, 6 = 7.5ms로 블루투스 표준 최솟값)
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6
# 연결 지연 (0으로 설정해야 스크롤 및 입력 밀림이 없음)
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
# ACL 데이터 패킷 전송 버퍼 수
CONFIG_BT_BUF_ACL_TX_COUNT=32
# L2CAP 계층 전송 버퍼 수
CONFIG_BT_L2CAP_TX_BUF_COUNT=32
# 블루투스 송신 출력 설정 (+8dBm 최대)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# 블루투스 배터리 서비스 활성화
CONFIG_BT_BAS=y

# ===================== 자동 절전 및 대기 설정 =====================
# 자동 절전(Deep Sleep) 활성화
CONFIG_ZMK_SLEEP=y
# 절전 모드 진입 시간 (단위: ms, 현재 1시간)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000
# 유휴(Idle) 상태 진입 시간 (단위: ms, 현재 15초)
CONFIG_ZMK_IDLE_TIMEOUT=15000

# ===================== BLE 실험적 기능 =====================
# 실험적 연결 기능 활성화 (연결 안정성 향상)
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
# 중앙(Central) 보드에서 주변(Peripheral) 보드 배터리 잔량 읽기
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
# 배터리 잔량 프록시 설정
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
# 비헤이비어 큐 크기 (매크로/조합 키 응답성 향상)
CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=512

# ===================== 디스플레이 설정 =====================
# 디스플레이 지원 활성화
CONFIG_ZMK_DISPLAY=y
# 내장 상태 화면 사용
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y
# 커스텀 상태 화면 미사용
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=n
# 유휴 상태 시 화면 끄기
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y

# ===================== 장치 및 전원 설정 =====================
# SPI 버스 지원 활성화
CONFIG_SPI=y
# 입력 장치 지원 활성화
CONFIG_INPUT=y
# 외부 전원 감지 활성화
CONFIG_ZMK_EXT_POWER=y
# GPIO 제어 활성화
CONFIG_GPIO=y
# 핀 컨트롤 활성화
CONFIG_PINCTRL=y

# ===================== 백라이트 및 전원 제어 =====================
# 백라이트 지원 활성화
CONFIG_ZMK_BACKLIGHT=y
# 시작 시 백라이트 밝기 (0-100)
CONFIG_ZMK_BACKLIGHT_BRT_START=100
# 시작 시 자동 켜짐
CONFIG_ZMK_BACKLIGHT_ON_START=y
# 유휴 시 자동 꺼짐 미사용
CONFIG_ZMK_BACKLIGHT_AUTO_OFF_IDLE=n

# ===================== 포인팅 장치 (스크롤/마우스) =====================
# 마우스/스크롤 기능 활성화
CONFIG_ZMK_POINTING=y
# 부드러운 스크롤 비활성화 (딜레이 제거 및 마우스 휠 느낌 구현)
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=n
# 한 틱당 스크롤 이동량 (120으로 설정하여 반응성 강화)
CONFIG_ZMK_POINTING_DEFAULT_SCRL_VAL=100
# 노브 신호를 전역 스레드에서 즉시 처리 (응답 속도 최적화)
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# ===================== RGB 조명 설정 =====================
# WS2812 LED 스트립 지원
CONFIG_WS2812_STRIP=y
# RGB 언더글로우(Underglow) 활성화
CONFIG_ZMK_RGB_UNDERGLOW=y
# 시작 시 언더글로우 꺼짐 상태로 시작
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n
# 유휴 시 언더글로우 자동 꺼짐
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
# 초기 색상 및 효과 설정
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=160
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3
# RGB 스위치로 전원 동시 제어
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=y
# 최대 밝기 제한 (발열 방지 및 전력 절약)
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=70

# ===================== 입력 성능 최적화 =====================
# 입력 디바운스(Debounce) 시간 설정 (5ms)
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=3
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5
# 32kHz 크리스탈 클럭 설정 (안정성 향상)
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_30PPM=y
# 무한 동시 입력(NKRO) 활성화
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y

# ===================== 기타 시스템 설정 =====================
# USB 로깅 비활성화 (성능 및 전력 최적화)
CONFIG_ZMK_USB_LOGGING=n
